name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    container: clojure:temurin-21-lein
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: lein with-profile +dev deps
      - name: Lint
        run: lein lint
      - name: Format check
        run: lein fmt:check

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build test image
        run: docker build -t research-test -f Dockerfile.test .
      - name: Unit tests
        run: docker run --rm research-test :unit
      - name: Integration tests
        run: docker run --rm -v "${{ github.workspace }}/tmp_cache:/app/tmp_cache" research-test :integration
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-screenshots
          path: tmp_cache
